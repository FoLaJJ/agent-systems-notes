<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent 质量与安全门中文图</title>
  <desc id="desc">中文矩阵图，展示 Agent 系统从组件、轨迹、产物、业务结果到权限、数据、注入和供应链的质量安全检查。</desc>
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .eval { fill: #e7f0ff; stroke: #1f6feb; stroke-width: 2; rx: 16; }
      .safe { fill: #e8f7ed; stroke: #2da44e; stroke-width: 2; rx: 16; }
      .warn { fill: #fff5cc; stroke: #d4a72c; stroke-width: 2; rx: 16; }
      .risk { fill: #ffecec; stroke: #e5534b; stroke-width: 2; rx: 16; }
      .text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2328; }
      .small { font-size: 22px; }
      .mid { font-size: 28px; font-weight: 700; }
      .big { font-size: 36px; font-weight: 700; }
      .line { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .soft { fill: none; stroke: #94a3b8; stroke-width: 2.5; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="text big" x="640" y="58" text-anchor="middle">质量与安全：从结果看回全过程</text>
  <text class="text small" x="640" y="94" text-anchor="middle">Agent 不能只看最终回答；路由、轨迹、权限、证据和回滚都要有可验证门槛</text>

  <rect class="eval" x="76" y="150" width="220" height="112"/>
  <text class="text mid" x="186" y="194" text-anchor="middle">组件评测</text>
  <text class="text small" x="186" y="228" text-anchor="middle">模型、检索、Tool</text>

  <rect class="eval" x="372" y="150" width="220" height="112"/>
  <text class="text mid" x="482" y="194" text-anchor="middle">轨迹评测</text>
  <text class="text small" x="482" y="228" text-anchor="middle">路由、调用、审批</text>

  <rect class="eval" x="668" y="150" width="220" height="112"/>
  <text class="text mid" x="778" y="194" text-anchor="middle">产物评测</text>
  <text class="text small" x="778" y="228" text-anchor="middle">结论、证据、未知</text>

  <rect class="eval" x="964" y="150" width="220" height="112"/>
  <text class="text mid" x="1074" y="194" text-anchor="middle">业务评测</text>
  <text class="text small" x="1074" y="228" text-anchor="middle">风险、时间、成本</text>

  <rect class="safe" x="76" y="368" width="220" height="112"/>
  <text class="text mid" x="186" y="412" text-anchor="middle">权限门</text>
  <text class="text small" x="186" y="446" text-anchor="middle">最小权限、审批</text>

  <rect class="safe" x="372" y="368" width="220" height="112"/>
  <text class="text mid" x="482" y="412" text-anchor="middle">数据门</text>
  <text class="text small" x="482" y="446" text-anchor="middle">脱敏、租户、来源</text>

  <rect class="warn" x="668" y="368" width="220" height="112"/>
  <text class="text mid" x="778" y="412" text-anchor="middle">注入门</text>
  <text class="text small" x="778" y="446" text-anchor="middle">外部内容不当指令</text>

  <rect class="warn" x="964" y="368" width="220" height="112"/>
  <text class="text mid" x="1074" y="412" text-anchor="middle">供应链门</text>
  <text class="text small" x="1074" y="446" text-anchor="middle">依赖、脚本、Server</text>

  <rect class="risk" x="304" y="588" width="672" height="80"/>
  <text class="text mid" x="640" y="622" text-anchor="middle">发布门</text>
  <text class="text small" x="640" y="652" text-anchor="middle">证据充分、可回滚、可停用，才进入生产基线</text>

  <path class="line" d="M296 206 L372 206"/>
  <path class="line" d="M592 206 L668 206"/>
  <path class="line" d="M888 206 L964 206"/>
  <path class="soft" d="M186 262 V368"/>
  <path class="soft" d="M482 262 V368"/>
  <path class="soft" d="M778 262 V368"/>
  <path class="soft" d="M1074 262 V368"/>

  <path class="soft" d="M186 480 V548 H640 V588"/>
  <path class="soft" d="M482 480 V548 H640"/>
  <path class="soft" d="M778 480 V548 H640"/>
  <path class="soft" d="M1074 480 V548 H640"/>

  <text class="text small" x="640" y="324" text-anchor="middle">上排回答“有没有做对”，下排回答“能不能安全交付”</text>
</svg>
