<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Tool Call 生命周期中文图</title>
  <desc id="desc">中文流程图，展示工具调用从用户目标、模型提议、Harness 校验、工具执行、结果回填到最终回答的闭环。</desc>
  <defs>
    <style>
      .bg { fill: #fbfcfe; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 16; }
      .model { fill: #e8f7ed; stroke: #2da44e; stroke-width: 2; rx: 16; }
      .runtime { fill: #e7f0ff; stroke: #1f6feb; stroke-width: 2; rx: 16; }
      .warn { fill: #fff1e5; stroke: #fb8500; stroke-width: 2; rx: 16; }
      .text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2328; }
      .small { font-size: 22px; }
      .mid { font-size: 28px; font-weight: 700; }
      .big { font-size: 36px; font-weight: 700; }
      .line { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .note { fill: #fff; stroke: #94a3b8; stroke-width: 1.5; rx: 12; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="text big" x="640" y="58" text-anchor="middle">Tool Call 不是执行结果，而是动作提议</text>
  <text class="text small" x="640" y="94" text-anchor="middle">可靠闭环必须保留调用身份、校验授权、执行证据和结果回填</text>

  <rect class="box" x="70" y="166" width="170" height="110"/>
  <text class="text mid" x="155" y="210" text-anchor="middle">用户目标</text>
  <text class="text small" x="155" y="244" text-anchor="middle">要解决什么</text>

  <rect class="runtime" x="300" y="146" width="210" height="150"/>
  <text class="text mid" x="405" y="195" text-anchor="middle">Harness</text>
  <text class="text small" x="405" y="230" text-anchor="middle">选择工具定义</text>
  <text class="text small" x="405" y="262" text-anchor="middle">组装模型请求</text>

  <rect class="model" x="570" y="146" width="190" height="150"/>
  <text class="text mid" x="665" y="195" text-anchor="middle">模型</text>
  <text class="text small" x="665" y="230" text-anchor="middle">提出工具名</text>
  <text class="text small" x="665" y="262" text-anchor="middle">与参数</text>

  <rect class="warn" x="820" y="132" width="220" height="178"/>
  <text class="text mid" x="930" y="182" text-anchor="middle">五层检查</text>
  <text class="text small" x="930" y="216" text-anchor="middle">Schema · 语义</text>
  <text class="text small" x="930" y="248" text-anchor="middle">身份 · 授权</text>
  <text class="text small" x="930" y="280" text-anchor="middle">预算 · 审批</text>

  <rect class="box" x="1090" y="166" width="150" height="110"/>
  <text class="text mid" x="1165" y="210" text-anchor="middle">工具执行</text>
  <text class="text small" x="1165" y="244" text-anchor="middle">真实系统</text>

  <rect class="runtime" x="844" y="430" width="236" height="128"/>
  <text class="text mid" x="962" y="476" text-anchor="middle">结果回填</text>
  <text class="text small" x="962" y="510" text-anchor="middle">限量、脱敏、标来源</text>

  <rect class="model" x="570" y="422" width="210" height="144"/>
  <text class="text mid" x="675" y="470" text-anchor="middle">下一轮推理</text>
  <text class="text small" x="675" y="504" text-anchor="middle">基于真实观察</text>
  <text class="text small" x="675" y="536" text-anchor="middle">继续或结束</text>

  <rect class="box" x="300" y="430" width="210" height="128"/>
  <text class="text mid" x="405" y="476" text-anchor="middle">最终回答</text>
  <text class="text small" x="405" y="510" text-anchor="middle">结论、证据、未知</text>

  <path class="line" d="M240 221 L300 221"/>
  <path class="line" d="M510 221 L570 221"/>
  <path class="line" d="M760 221 L820 221"/>
  <path class="line" d="M1040 221 L1090 221"/>
  <path class="line" d="M1165 276 C1165 370 1090 418 1080 494"/>
  <path class="line" d="M844 494 L780 494"/>
  <path class="line" d="M570 494 L510 494"/>

  <rect class="note" x="78" y="342" width="356" height="86"/>
  <text class="text small" x="256" y="376" text-anchor="middle">模型返回的是“想调用什么”</text>
  <text class="text small" x="256" y="408" text-anchor="middle">不是“已经调用成功”</text>

  <rect class="note" x="846" y="342" width="356" height="86"/>
  <text class="text small" x="1024" y="376" text-anchor="middle">执行证据来自工具和外部状态</text>
  <text class="text small" x="1024" y="408" text-anchor="middle">不是来自模型自述</text>
</svg>
