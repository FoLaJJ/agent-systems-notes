<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">上下文工程流水线中文图</title>
  <desc id="desc">中文流程图，展示候选资料经过权限过滤、选择转换、排序压缩和来源追踪后进入本次模型调用。</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .source { fill: #eef6ff; stroke: #2f80ed; stroke-width: 2; rx: 14; }
      .gate { fill: #fff8df; stroke: #d4a72c; stroke-width: 2; rx: 14; }
      .view { fill: #eaf7ef; stroke: #2da44e; stroke-width: 2; rx: 18; }
      .store { fill: #f3edff; stroke: #8b5cf6; stroke-width: 2; rx: 14; }
      .text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2328; }
      .small { font-size: 21px; }
      .mid { font-size: 27px; font-weight: 700; }
      .big { font-size: 36px; font-weight: 700; }
      .line { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="text big" x="640" y="58" text-anchor="middle">上下文不是资料袋，而是临时执行视图</text>
  <text class="text small" x="640" y="94" text-anchor="middle">目标是在预算内提供足够、可信、最小的当前证据</text>

  <rect class="source" x="64" y="148" width="210" height="74"/>
  <text class="text mid" x="169" y="193" text-anchor="middle">项目指令</text>
  <rect class="source" x="64" y="246" width="210" height="74"/>
  <text class="text mid" x="169" y="291" text-anchor="middle">Skill 正文</text>
  <rect class="source" x="64" y="344" width="210" height="74"/>
  <text class="text mid" x="169" y="389" text-anchor="middle">RAG 片段</text>
  <rect class="source" x="64" y="442" width="210" height="74"/>
  <text class="text mid" x="169" y="487" text-anchor="middle">Memory</text>
  <rect class="source" x="64" y="540" width="210" height="74"/>
  <text class="text mid" x="169" y="585" text-anchor="middle">Tool 结果</text>

  <rect class="gate" x="374" y="162" width="196" height="118"/>
  <text class="text mid" x="472" y="208" text-anchor="middle">权限过滤</text>
  <text class="text small" x="472" y="242" text-anchor="middle">主体 · 租户 · ACL</text>

  <rect class="gate" x="374" y="330" width="196" height="118"/>
  <text class="text mid" x="472" y="376" text-anchor="middle">信任分层</text>
  <text class="text small" x="472" y="410" text-anchor="middle">指令与数据分开</text>

  <rect class="gate" x="638" y="162" width="210" height="118"/>
  <text class="text mid" x="743" y="208" text-anchor="middle">选择转换</text>
  <text class="text small" x="743" y="242" text-anchor="middle">去重 · 摘要 · 脱敏</text>

  <rect class="gate" x="626" y="330" width="234" height="118"/>
  <text class="text mid" x="743" y="376" text-anchor="middle">排序压缩</text>
  <text class="text small" x="743" y="410" text-anchor="middle">预算 · 反证 · 停止</text>

  <rect class="view" x="924" y="188" width="284" height="188"/>
  <text class="text mid" x="1066" y="238" text-anchor="middle">本次模型调用</text>
  <text class="text small" x="1066" y="276" text-anchor="middle">当前目标</text>
  <text class="text small" x="1066" y="310" text-anchor="middle">必要状态</text>
  <text class="text small" x="1066" y="344" text-anchor="middle">有限证据与工具定义</text>

  <rect class="store" x="924" y="474" width="284" height="104"/>
  <text class="text mid" x="1066" y="518" text-anchor="middle">来源轨迹</text>
  <text class="text small" x="1066" y="552" text-anchor="middle">ID · 版本 · 时间 · 权限范围</text>

  <path class="line" d="M274 185 C310 185 332 194 374 208"/>
  <path class="line" d="M274 283 C310 283 332 246 374 230"/>
  <path class="line" d="M274 381 C318 381 334 365 374 386"/>
  <path class="line" d="M274 479 C320 479 336 416 374 406"/>
  <path class="line" d="M274 577 C336 577 344 438 374 416"/>
  <path class="line" d="M570 221 L638 221"/>
  <path class="line" d="M570 389 L638 389"/>
  <path class="line" d="M848 221 C888 230 902 248 924 272"/>
  <path class="line" d="M848 389 C894 378 906 342 924 316"/>
  <path class="line" d="M1066 376 L1066 474"/>

  <text class="text small" x="640" y="658" text-anchor="middle">关键原则：系统里有资料，不等于模型在正确时点看到了正确资料。</text>
</svg>
