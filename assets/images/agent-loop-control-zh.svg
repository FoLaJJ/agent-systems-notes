<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent Loop 控制链中文图</title>
  <desc id="desc">中文流程图，展示 Agent Loop 中观察、判断、提议、校验、执行、记录和停止条件之间的受控循环。</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .box { fill: #ffffff; stroke: #c9d4df; stroke-width: 2; rx: 16; }
      .model { fill: #e8f7ed; stroke: #2da44e; stroke-width: 2; rx: 16; }
      .runtime { fill: #e7f0ff; stroke: #1f6feb; stroke-width: 2; rx: 16; }
      .risk { fill: #fff1e5; stroke: #fb8500; stroke-width: 2; rx: 16; }
      .stop { fill: #ffecec; stroke: #e5534b; stroke-width: 2; rx: 16; }
      .text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2328; }
      .small { font-size: 22px; }
      .mid { font-size: 28px; font-weight: 700; }
      .big { font-size: 36px; font-weight: 700; }
      .line { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .loop { fill: none; stroke: #64748b; stroke-width: 3; stroke-dasharray: 8 8; marker-end: url(#arrow); }
      .note { fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; rx: 12; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="text big" x="640" y="58" text-anchor="middle">Agent Loop：模型提议，运行时控制</text>
  <text class="text small" x="640" y="94" text-anchor="middle">一次循环必须把状态、权限、预算、执行证据和停止条件放进同一条控制链</text>

  <rect class="runtime" x="72" y="166" width="170" height="112"/>
  <text class="text mid" x="157" y="210" text-anchor="middle">1 观察</text>
  <text class="text small" x="157" y="244" text-anchor="middle">目标、状态</text>

  <rect class="model" x="292" y="166" width="170" height="112"/>
  <text class="text mid" x="377" y="210" text-anchor="middle">2 判断</text>
  <text class="text small" x="377" y="244" text-anchor="middle">选择下一步</text>

  <rect class="model" x="512" y="166" width="182" height="112"/>
  <text class="text mid" x="603" y="210" text-anchor="middle">3 提议</text>
  <text class="text small" x="603" y="244" text-anchor="middle">回答或 Tool Call</text>

  <rect class="risk" x="744" y="144" width="204" height="156"/>
  <text class="text mid" x="846" y="194" text-anchor="middle">4 校验</text>
  <text class="text small" x="846" y="228" text-anchor="middle">Schema · 权限</text>
  <text class="text small" x="846" y="260" text-anchor="middle">预算 · 审批</text>

  <rect class="box" x="998" y="166" width="190" height="112"/>
  <text class="text mid" x="1093" y="210" text-anchor="middle">5 执行</text>
  <text class="text small" x="1093" y="244" text-anchor="middle">工具或业务系统</text>

  <rect class="runtime" x="858" y="432" width="206" height="120"/>
  <text class="text mid" x="961" y="478" text-anchor="middle">6 记录</text>
  <text class="text small" x="961" y="512" text-anchor="middle">结果、错误、Trace</text>

  <rect class="stop" x="536" y="432" width="206" height="120"/>
  <text class="text mid" x="639" y="478" text-anchor="middle">7 停止门</text>
  <text class="text small" x="639" y="512" text-anchor="middle">完成、阻断、接管</text>

  <rect class="box" x="202" y="432" width="230" height="120"/>
  <text class="text mid" x="317" y="478" text-anchor="middle">产物交付</text>
  <text class="text small" x="317" y="512" text-anchor="middle">结论、证据、未知项</text>

  <path class="line" d="M242 222 L292 222"/>
  <path class="line" d="M462 222 L512 222"/>
  <path class="line" d="M694 222 L744 222"/>
  <path class="line" d="M948 222 L998 222"/>
  <path class="line" d="M1093 278 V354 H961 V432"/>
  <path class="line" d="M858 492 L742 492"/>
  <path class="line" d="M536 492 L432 492"/>
  <path class="loop" d="M639 432 V318 H157 V278"/>

  <rect class="note" x="64" y="336" width="348" height="70"/>
  <text class="text small" x="238" y="380" text-anchor="middle">未结束：更新状态后再观察</text>

  <rect class="note" x="804" y="336" width="390" height="70"/>
  <text class="text small" x="999" y="380" text-anchor="middle">真实效果来自执行方，不靠模型自述</text>
</svg>
