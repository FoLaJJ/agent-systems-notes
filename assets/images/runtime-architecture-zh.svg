<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">生产级 Agent Runtime 中文架构图</title>
  <desc id="desc">中文架构图，展示入口、任务队列、Task Store、编排器、产物、模型网关、工具网关、审批回滚、观测和发布开关之间的关系。</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .box { fill: #ffffff; stroke: #c9d4df; stroke-width: 2; rx: 16; }
      .main { fill: #e7f5ff; stroke: #1f6feb; stroke-width: 2; rx: 16; }
      .state { fill: #e8f7ed; stroke: #2da44e; stroke-width: 2; rx: 16; }
      .guard { fill: #fff1e5; stroke: #fb8500; stroke-width: 2; rx: 16; }
      .risk { fill: #ffecec; stroke: #e5534b; stroke-width: 2; rx: 16; }
      .text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2328; }
      .small { font-size: 22px; }
      .mid { font-size: 28px; font-weight: 700; }
      .big { font-size: 36px; font-weight: 700; }
      .line { fill: none; stroke: #64748b; stroke-width: 3; marker-end: url(#arrow); }
      .thin { fill: none; stroke: #94a3b8; stroke-width: 2.5; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrowSoft" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text class="text big" x="640" y="58" text-anchor="middle">生产级 Agent Runtime：可恢复、可审计、可停用</text>
  <text class="text small" x="640" y="94" text-anchor="middle">演示循环升级为状态机、队列、网关、审批、观测和发布控制</text>

  <rect class="box" x="48" y="170" width="186" height="100"/>
  <text class="text mid" x="141" y="210" text-anchor="middle">入口</text>
  <text class="text small" x="141" y="242" text-anchor="middle">聊天 / API / 工单</text>

  <rect class="main" x="282" y="146" width="190" height="148"/>
  <text class="text mid" x="377" y="194" text-anchor="middle">任务队列</text>
  <text class="text small" x="377" y="228" text-anchor="middle">背压 · 优先级</text>
  <text class="text small" x="377" y="260" text-anchor="middle">取消传播</text>

  <rect class="state" x="532" y="146" width="216" height="148"/>
  <text class="text mid" x="640" y="194" text-anchor="middle">Task Store</text>
  <text class="text small" x="640" y="228" text-anchor="middle">状态 · 检查点</text>
  <text class="text small" x="640" y="260" text-anchor="middle">Run / Step / Call</text>

  <rect class="main" x="810" y="146" width="206" height="148"/>
  <text class="text mid" x="913" y="194" text-anchor="middle">编排器</text>
  <text class="text small" x="913" y="228" text-anchor="middle">图状态机</text>
  <text class="text small" x="913" y="260" text-anchor="middle">停止条件</text>

  <rect class="box" x="1072" y="170" width="156" height="100"/>
  <text class="text mid" x="1150" y="210" text-anchor="middle">产物</text>
  <text class="text small" x="1150" y="242" text-anchor="middle">报告 / 工单</text>

  <rect class="guard" x="230" y="392" width="210" height="126"/>
  <text class="text mid" x="335" y="438" text-anchor="middle">模型网关</text>
  <text class="text small" x="335" y="472" text-anchor="middle">选择 · 降级 · 缓存</text>

  <rect class="guard" x="535" y="392" width="210" height="126"/>
  <text class="text mid" x="640" y="438" text-anchor="middle">工具网关</text>
  <text class="text small" x="640" y="472" text-anchor="middle">MCP · API · 沙箱</text>

  <rect class="risk" x="840" y="392" width="210" height="126"/>
  <text class="text mid" x="945" y="438" text-anchor="middle">审批与回滚</text>
  <text class="text small" x="945" y="472" text-anchor="middle">批准 · 对账 · 停用</text>

  <rect class="state" x="178" y="582" width="250" height="74"/>
  <text class="text mid" x="303" y="628" text-anchor="middle">Trace / Metrics</text>

  <rect class="state" x="515" y="582" width="250" height="74"/>
  <text class="text mid" x="640" y="628" text-anchor="middle">证据 / 产物</text>

  <rect class="risk" x="852" y="582" width="250" height="74"/>
  <text class="text mid" x="977" y="628" text-anchor="middle">发布开关</text>

  <path class="line" d="M226 220 L282 220"/>
  <path class="line" d="M472 220 L532 220"/>
  <path class="line" d="M748 220 L810 220"/>
  <path class="line" d="M1016 220 L1072 220"/>
  <path class="thin" d="M377 294 V392"/>
  <path class="thin" d="M640 294 V392"/>
  <path class="thin" d="M913 294 V392"/>
  <path class="thin" d="M335 518 L303 582"/>
  <path class="thin" d="M640 518 V582"/>
  <path class="thin" d="M945 518 L977 582"/>

  <text class="text small" x="640" y="338" text-anchor="middle">终态由状态机表达，不由模型一句“完成了”决定</text>
  <text class="text small" x="640" y="692" text-anchor="middle">网关层负责把模型、工具和写操作变成可观测、可恢复的系统行为</text>
</svg>
